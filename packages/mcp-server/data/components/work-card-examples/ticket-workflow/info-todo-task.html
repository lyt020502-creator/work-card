<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>工作卡 - 待办任务</title>
<link rel="stylesheet" href="../shared/work-card-base.css" />
<style>
  /* ── 本案例特有样式 ── */

  /* 会议超链接 */
  .wc-attr-value--link {
    color: var(--brand-base);
    cursor: pointer;
    text-decoration: none;
  }
  .wc-attr-value--link:hover {
    opacity: 0.8;
  }
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     工作卡：待办任务
     类型：展示类 | 图标：IconTodo | 卡头色：blue（默认）
     组件：wc-title1 + AttrList（含链接值）+ Actions(fill)
     ════════════════════════════════════════════════════════════ -->
<div class="work-card">

  <!-- ── WorkCardHeader ── -->
  <div class="work-card-header">
    <span class="work-card-header__icon">
      <!-- IconTodo（日历+勾选）— 来自 work-card.tsx -->
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M2.5 4.79167C2.5 3.52601 3.52601 2.5 4.79167 2.5H15.2083C16.474 2.5 17.5 3.52601 17.5 4.79167V5.9375H2.50011V7.1875H17.5V15.2083C17.5 16.474 16.474 17.5 15.2083 17.5H4.79167C3.52601 17.5 2.5 16.474 2.5 15.2083V4.79167ZM8.15027 11.2247C7.90619 10.9806 7.51046 10.9806 7.26638 11.2247C7.02231 11.4688 7.02231 11.8645 7.26638 12.1086L8.88828 13.7305C9.13236 13.9746 9.52809 13.9746 9.77217 13.7305L13.5025 10.0001C13.7466 9.75606 13.7466 9.36033 13.5025 9.11626C13.2585 8.87218 12.8627 8.87218 12.6187 9.11626L9.33022 12.4047L8.15027 11.2247Z" fill="currentColor"/>
      </svg>
    </span>
    <span class="work-card-header__label">待办事项</span>
  </div>

  <!-- ── WorkCardBody ── -->
  <div class="work-card-body">

    <!-- 主标题 -->
    <h3 class="wc-title1">Q2 产品需求评审报告撰写</h3>

    <!-- 属性列表 -->
    <div class="wc-attr-list">
      <div class="wc-attr-item">
        <span class="wc-attr-label">截止时间</span>
        <span class="wc-attr-value">2026-04-15 18:00</span>
      </div>
      <div class="wc-attr-item">
        <span class="wc-attr-label">创建者</span>
        <span class="wc-attr-value">张明</span>
      </div>
      <div class="wc-attr-item">
        <span class="wc-attr-label">执行人</span>
        <span class="wc-attr-value">李伟、王芳、陈刚</span>
      </div>
      <div class="wc-attr-item">
        <span class="wc-attr-label">来自会议</span>
        <span class="wc-attr-value"><a href="https://example.com/meeting/12345" target="_blank" rel="noopener noreferrer" class="wc-attr-value--link">Q2 产品规划周会</a></span>
      </div>
    </div>

    <!-- 查看详情（次要）+ 完成待办（主要）按钮组 -->
    <div class="wc-actions wc-actions--fill">
      <button class="wc-btn wc-btn--outline" type="button">查看详情</button>
      <button class="wc-btn wc-btn--outline-primary" type="button">完成待办</button>
    </div>

  </div>

  <!-- ── WorkCardFooter 底部品牌区（固定模板，禁止修改） ── -->
